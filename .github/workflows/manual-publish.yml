name: Manual Publish (bootstrap)

# One-shot publish path that bypasses the reusable release workflow's
# Sigstore attestation step. Attestation has a known verifier bug for
# reusable workflows (cert SAN has reusable's tag, verifier expects
# consuming gem's tag), and the patch's "retry without attestation"
# fallback only handles local sign failures, not server-side rejection.
#
# Trusted publisher OIDC exchange still happens (via
# configure-rubygems-credentials) — no API key needed. After v0.1.0 lands
# on RubyGems, a regular trusted publisher can be registered against the
# gem itself and v0.1.1+ can ride the reusable workflow normally.
#
# Delete this file once the gem is published.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to build and publish (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: rubygems
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4.4
          bundler-cache: true

      - name: Configure RubyGems credentials via OIDC
        uses: rubygems/configure-rubygems-credentials@bc6dd217f8a4f919d6835fcfefd470ef821f5c44 # v1.0.0

      - name: Build gem
        run: gem build standard_health.gemspec

      - name: Push gem (attestation skipped)
        run: gem push standard_health-*.gem
