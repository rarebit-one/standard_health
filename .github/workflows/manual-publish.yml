name: Manual Publish (bootstrap)

# One-shot publish using a RUBYGEMS_API_KEY secret. We can't use the
# reusable-gem-release workflow because its attestation step has a
# verifier bug for reusable workflows. We can't use a thin OIDC-only
# inline workflow either, because that would require its own pending
# trusted publisher (filename mismatch with the existing one).
#
# Bootstrap with API key, register a regular trusted publisher against
# the published gem, then v0.1.1+ uses the reusable workflow normally.
# Delete this file once the gem is on RubyGems.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to build and publish (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4.4
          bundler-cache: true

      - name: Configure RubyGems credentials
        env:
          RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: |
          install -m 700 -d ~/.gem
          install -m 600 /dev/null ~/.gem/credentials
          printf -- "---\n:rubygems_api_key: %s\n" "$RUBYGEMS_API_KEY" > ~/.gem/credentials

      - name: Build gem
        run: gem build standard_health.gemspec

      - name: Push to RubyGems
        run: gem push standard_health-*.gem
