name: Debug OIDC

# Temporary diagnostic workflow. Triggers manually, mints an OIDC token
# for audience rubygems.org (same as the release publish job), and prints
# the decoded claims so we can compare them to the RubyGems trusted
# publisher config. Delete this file once the publish flow works.

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    environment: rubygems
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Mint OIDC token and print claims
        run: |
          set -eu
          TOKEN=$(curl -sL \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=rubygems.org" \
            | python3 -c "import sys, json; print(json.load(sys.stdin)['value'])")

          PAYLOAD=$(echo "$TOKEN" | cut -d. -f2)
          PAD=$(( (4 - ${#PAYLOAD} % 4) % 4 ))
          if [ $PAD -ne 0 ]; then PAYLOAD="${PAYLOAD}$(printf '=%.0s' $(seq 1 $PAD))"; fi
          DECODED=$(echo "$PAYLOAD" | tr '_-' '/+' | base64 -d 2>/dev/null)

          echo "::group::Decoded OIDC claims"
          echo "$DECODED" | python3 -m json.tool
          echo "::endgroup::"

          # Save token for next step
          echo "$TOKEN" > /tmp/oidc_token

      - name: Probe RubyGems trusted-publisher exchange
        run: |
          set -eu
          TOKEN=$(cat /tmp/oidc_token)

          echo "::group::Direct exchange_token call"
          # Mask the JWT in the printed body but keep response visible.
          BODY=$(python3 -c "import json,sys; print(json.dumps({'jwt': sys.argv[1]}))" "$TOKEN")
          curl -isS -X POST \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json' \
            -d "$BODY" \
            'https://rubygems.org/api/v1/oidc/trusted_publisher/exchange_token' || true
          echo
          echo "::endgroup::"
